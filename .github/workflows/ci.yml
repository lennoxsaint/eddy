name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so the git-describe version resolves

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install (editable, with dev tools)
        run: python -m pip install --upgrade pip && pip install -e ".[dev]"

      - name: Ruff (lint)
        run: ruff check src tests

      - name: Mypy (types)
        run: mypy src/eddy

      - name: Pytest (with coverage floor)
        # --cov reads fail_under from [tool.coverage.report] in pyproject (the GA ratchet floor); the
        # job fails if coverage regresses below it. This is the required-green gate before any tag.
        run: pytest -q --cov=eddy --cov-report=term-missing

# v0.6 adds the 3-OS matrix (macOS/Windows/Linux) running a real per-OS render + a built-wheel
# clean-venv smoke test. v0.4 stands up the gate: ruff + mypy + the unit suite, green-to-tag.
