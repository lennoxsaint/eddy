name: CI

on:
  push:
  pull_request:

# Cancel an in-progress run when a newer commit lands on the same ref — saves runner minutes on
# rapid pushes without losing signal (the newest commit is the one that matters).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0   # full history so the git-describe version resolves

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install ffmpeg 8 (static build)
        # Eddy's preflight requires ffmpeg 8+ and the real-render tests run here, but ubuntu-latest apt
        # ships 6.x and setup-ffmpeg's Linux build (John Van Sickle) lags too. BtbN's static build is
        # current (>= 8) and is what makes the preflight + av-drift tests pass on the hosted runner.
        run: |
          set -euo pipefail
          url=https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-linux64-gpl.tar.xz
          curl -fsSL "$url" -o /tmp/ffmpeg.tar.xz
          mkdir -p /tmp/ffmpeg && tar -xf /tmp/ffmpeg.tar.xz -C /tmp/ffmpeg --strip-components=1
          echo "/tmp/ffmpeg/bin" >> "$GITHUB_PATH"
          /tmp/ffmpeg/bin/ffmpeg -version | head -1

      - name: Install (editable, with dev tools)
        run: python -m pip install --upgrade pip && pip install -e ".[dev]"

      - name: Ruff (lint)
        run: ruff check src tests

      - name: Mypy (types)
        run: mypy src/eddy

      - name: Pytest (with coverage floor)
        # --cov reads fail_under from [tool.coverage.report] in pyproject (the GA ratchet floor); the
        # job fails if coverage regresses below it. This is the required-green gate before any tag.
        run: pytest -q --cov=eddy --cov-report=term-missing

# v0.6 adds the 3-OS matrix (macOS/Windows/Linux) running a real per-OS render + a built-wheel
# clean-venv smoke test. v0.4 stands up the gate: ruff + mypy + the unit suite, green-to-tag.
