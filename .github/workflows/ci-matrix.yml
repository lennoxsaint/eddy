name: CI matrix (3-OS)

# Heavy cross-platform validation: runs the suite + a REAL per-OS render + a built-wheel smoke on
# macOS, Linux, and Windows. Triggered on release tags, on code pushes to main (path-filtered so
# doc-only commits don't spend the heavy 3-OS render minutes), and on demand. The fast lint/type/test
# gate in ci.yml runs on every push.
on:
  push:
    branches: ["main"]
    tags: ["v*"]
    paths:
      - "src/**"
      - "tests/**"
      - "pyproject.toml"
      - "requirements.lock"
      - "scripts/**"
      - ".github/workflows/ci-matrix.yml"
  workflow_dispatch:

# Cancel a superseded matrix run when a newer commit lands on the same ref — keeps rapid pushes from
# piling up several full 3-OS render runs at once.
concurrency:
  group: ci-matrix-${{ github.ref }}
  cancel-in-progress: true

jobs:
  matrix:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    # Run Python in UTF-8 mode so Eddy's Unicode output (arrows, ✓/✗) doesn't hit Windows' legacy
    # cp1252 console encoding during tests.
    env:
      PYTHONUTF8: "1"
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0   # git-describe version

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      # Eddy requires ffmpeg 8+. Per-OS source: Windows setup-ffmpeg (gyan, x64); macOS Homebrew
      # (setup-ffmpeg has no arm64 build and macos-latest is Apple Silicon); Linux BtbN static build
      # (apt + setup-ffmpeg's Linux build both lag behind 8).
      - name: Install ffmpeg (Windows)
        if: runner.os == 'Windows'
        uses: federicocarboni/setup-ffmpeg@v3
      - name: Install ffmpeg (macOS)
        if: runner.os == 'macOS'
        run: brew install ffmpeg
      - name: Install ffmpeg 8 (Linux static)
        if: runner.os == 'Linux'
        run: |
          set -euo pipefail
          url=https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-linux64-gpl.tar.xz
          curl -fsSL "$url" -o /tmp/ffmpeg.tar.xz
          mkdir -p /tmp/ffmpeg && tar -xf /tmp/ffmpeg.tar.xz -C /tmp/ffmpeg --strip-components=1
          echo "/tmp/ffmpeg/bin" >> "$GITHUB_PATH"
          /tmp/ffmpeg/bin/ffmpeg -version | head -1

      - name: Install (editable + dev tools)
        run: python -m pip install --upgrade pip && pip install -e ".[dev]"

      - name: Lint + types
        run: |
          ruff check src tests
          mypy src/eddy

      - name: Unit + real-render tests (incl. needs_ffmpeg)
        run: pytest -q --cov=eddy --cov-report=term-missing

      - name: Build wheel + clean-venv smoke
        shell: bash
        run: |
          python -m pip install build
          python -m build --wheel
          VENV="${RUNNER_TEMP:-/tmp}/eddy-smoke"
          python -m venv "$VENV"
          if [ -x "$VENV/bin/python" ]; then PY="$VENV/bin/python"; else PY="$VENV/Scripts/python"; fi
          "$PY" -m pip install --upgrade pip
          "$PY" -m pip install dist/*.whl
          "$PY" -m eddy --version
          "$PY" -m eddy doctor --no-write
