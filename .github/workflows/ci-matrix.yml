name: CI matrix (3-OS)

# Heavy cross-platform validation: runs the suite + a REAL per-OS render + a built-wheel smoke on
# macOS, Linux, and Windows. Triggered on release tags and on demand (the fast lint/type/test gate
# in ci.yml runs on every push). Requires a remote — wired here, runs once the repo is on GitHub.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  matrix:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # git-describe version

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ffmpeg
        uses: federicocarboni/setup-ffmpeg@v3

      - name: Install (editable + dev tools)
        run: python -m pip install --upgrade pip && pip install -e ".[dev]"

      - name: Lint + types
        run: |
          ruff check src tests
          mypy src/eddy

      - name: Unit + real-render tests (incl. needs_ffmpeg)
        run: pytest -q --cov=eddy --cov-report=term-missing

      - name: Build wheel + clean-venv smoke
        shell: bash
        run: |
          python -m pip install build
          python -m build --wheel
          python -m venv /tmp/eddy-smoke || python -m venv "$RUNNER_TEMP/eddy-smoke"
          VENV="${RUNNER_TEMP:-/tmp}/eddy-smoke"
          if [ -f "$VENV/bin/python" ]; then PY="$VENV/bin/python"; else PY="$VENV/Scripts/python"; fi
          "$PY" -m pip install --upgrade pip
          "$PY" -m pip install dist/*.whl
          "$PY" -m eddy --version
          "$PY" -m eddy doctor --no-write
