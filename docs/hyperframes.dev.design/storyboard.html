<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Eddy Static Storyboard Proof</title>
  <style>
    :root { color-scheme: dark; --bg:#070A0F; --fg:#F7F8FB; --lime:#37FF8B; --red:#FF4D4D; --blue:#39BDF8; }
    body { margin:0; background:var(--bg); color:var(--fg); font:22px Inter, Arial, sans-serif; }
    main { display:grid; grid-template-columns:repeat(auto-fit,minmax(520px,1fr)); gap:24px; padding:32px; }
    section { aspect-ratio:16/9; border:3px solid var(--lime); padding:36px; box-sizing:border-box; background:linear-gradient(135deg,#07110C,#0B111C); }
    h1 { font-size:48px; margin:0 0 20px; }
    p { color:#DDE3EA; max-width:760px; line-height:1.25; }
    .tag { color:var(--lime); font-weight:800; font-size:16px; }
  </style>
</head>
<body>
  <main>
    <section>
      <div class="tag">STATIC PROOF TEMPLATE</div>
      <h1>Storyboard Before Motion</h1>
      <p>Replace this with run-specific frames generated by `eddy motion init-contract`.
      The stills must pass taste and collision review before animation starts.</p>
    </section>
  </main>
</body>
</html>
